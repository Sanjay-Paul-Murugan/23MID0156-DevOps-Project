apiVersion: apps/v1
kind: Deployment
metadata:
  name: college-event-deployment
  labels:
    app: college-event
spec:
  replicas: 2
  selector:
    matchLabels:
      app: college-event
  template:
    metadata:
      labels:
        app: college-event
    spec:
      containers:
      - name: college-event-site
        image: college-event-site:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: college-event-service
spec:
  type: NodePort
  selector:
    app: college-event
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080